services:
  db:
    image: postgres:16
    container_name: mebel_site_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d \"\$\${POSTGRES_DB}\" -U \"\$\${POSTGRES_USER}\"" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    image: ghcr.io/dsbykov/mebel_site:latest
    build: .
    container_name: mebel_site_app
    restart: always
    environment:
      - DEBUG=${DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=5432
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-127.0.0.1 localhost 0.0.0.0}
      - SOCIAL_AUTH_YANDEX_OAUTH2_KEY=${SOCIAL_AUTH_YANDEX_OAUTH2_KEY}
      - SOCIAL_AUTH_YANDEX_OAUTH2_SECRET=${SOCIAL_AUTH_YANDEX_OAUTH2_SECRET}
    volumes:
      - ./media:/app/media:rw
      - ./staticfiles:/app/staticfiles:rw
    depends_on:
      - db
    networks:
      - app_network
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: mebel_site_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro       # bind mount, только чтение
      - ./media:/app/media:ro                   # bind mount, только чтение
      - ./certbot:/var/www/certbot:ro
      - ./nginx_ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - app_network

  certbot:
    image: certbot/certbot
    container_name: mebel_site_certbot
    volumes:
      - ./certbot:/var/www/certbot
      - ./nginx_ssl:/etc/nginx/ssl

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
